services:
  mysql:
    image: mysql:8.0
    container_name: acceptance-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  api:
    image: ${API_IMAGE}
    container_name: acceptance-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};CharSet=utf8mb4;
      FileStorage__BasePath: /data/files
      DataProtection__KeysPath: /data/dp-keys
      Cors__AllowedOrigins__0: ${CORS_ALLOWED_ORIGIN}
      JwtAuth__SigningKey: ${JWT_SIGNING_KEY}
      TZ: Asia/Shanghai
    volumes:
      - api-files:/data/files
      - api-dpkeys:/data/dp-keys
    ports:
      - "${API_HOST_PORT}:8080"

  web:
    image: ${WEB_IMAGE}
    container_name: acceptance-web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_HOST_PORT}:80"

volumes:
  mysql-data:
  api-files:
  api-dpkeys:
